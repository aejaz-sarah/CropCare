<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CropCare | Intelligence Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url("{{ url_for('static', filename='background.png') }}") center/cover no-repeat fixed;
            color: white;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #10b981;
            outline: none;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-4">Crop Intelligence</h1>
            <p class="text-emerald-400/80 text-sm tracking-widest uppercase font-bold">Precision Agriculture Database</p>
        </div>

        <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-8 shadow-2xl">
            <form method="POST" action="{{ url_for('crop_info') }}" class="space-y-6">
                
                <div class="relative group">
                    <input type="text" name="query" placeholder="What are you growing? (e.g. Tomato)" required 
                           class="w-full glass-input py-5 px-6 rounded-2xl text-lg placeholder:text-gray-500">
                    <span class="absolute right-6 top-5 text-2xl group-hover:scale-110 transition-transform">🔍</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-bold text-emerald-500 ml-2 tracking-widest">Season</label>
                        <select name="preferred_season" class="w-full glass-input py-4 px-4 rounded-xl text-sm appearance-none cursor-pointer text-white bg-transparent">
    <option value="Spring" class="bg-black">Spring</option>
    <option value="Summer" class="bg-black">Summer</option>
    <option value="Monsoon" class="bg-black">Monsoon / Rainy</option>
    <option value="Autumn" class="bg-black">Autumn</option>
    <option value="Winter" class="bg-black">Winter</option>
</select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-bold text-emerald-500 ml-2 tracking-widest">Location</label>
                        <input type="text" name="location" placeholder="City (Optional)" 
                               class="w-full glass-input py-4 px-4 rounded-xl text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 text-white font-black uppercase tracking-widest rounded-2xl transition-all shadow-xl shadow-emerald-900/40 active:scale-95">
                    Generate Report
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5">
                <div class="flex justify-between items-center">
                    <a href="{{ url_for('home') }}" class="text-xs text-gray-500 hover:text-white transition-colors flex items-center">
                        <span class="mr-2">←</span> Dashboard
                    </a>
                    <a href="{{ url_for('index') }}" class="text-xs text-emerald-500 hover:text-emerald-400 font-bold transition-colors">
                        Try AI Disease Scanner
                    </a>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-8 text-white/20 text-[10px] uppercase tracking-[0.3em]">
            Real-time data powered by Agmarknet & Open-Meteo
        </p>
    </div>

</body>
</html>
